<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dash Frog</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060d06; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const W = Math.min(window.innerWidth, 480);
const H = Math.round(W * (640 / 480));
const GY = H - 60;

const P = {
  frog: 0x4a8c3f, frogLight: 0x6ab85e, frogDark: 0x2d5a27, frogBelly: 0x8fd67f,
  log: 0x5d4037, logDark: 0x3e2723, logLight: 0x6d4c41,
  bat: 0x4a148c, batWing: 0x7b1fa2, batDark: 0x2d0057,
};

// ── BIOME DEFINITIONS ─────────────────────────────────────────────────────────
const BIOMES = [
  {
    label: 'SWAMP', score: 0,
    sky1: 0x0d1a0d, sky2: 0x060d06,
    moon: { color: 0xd4e8a0, x: W-52, y: 52, r: 22, crescent: true },
    starColor: 0x8bc34a,
    stars: [[22,28],[65,14],[118,44],[182,19],[244,52],[308,24],[355,38],[418,13],[48,78],[155,68],[258,82],[385,72]],
    glowColor: null,
    ground: 0x2d5a27, groundTop: 0x3d7a32, groundShadow: 0x1a4a18,
    midKey: 'bg_mid_0', foreKey: 'bg_fore_0', midAlpha: 0.82, foreAlpha: 0.88,
    dustColor: 0x3d7a32, accentColor: '#8bc34a',
  },
  {
    label: 'MUSHROOM FOREST', score: 60,
    sky1: 0x160d25, sky2: 0x0a0613,
    moon: { color: 0xe8d4ff, x: W * 0.65, y: 55, r: 32, crescent: false },
    starColor: 0xce93d8,
    stars: [[35,22],[88,38],[140,16],[195,48],[260,28],[315,55],[370,20],[425,42],[60,88],[165,75],[285,90],[390,65]],
    glowColor: null,
    ground: 0x3a1a55, groundTop: 0x8b4fc0, groundShadow: 0x1a0a33,
    midKey: 'bg_mid_1', foreKey: 'bg_fore_1', midAlpha: 0.85, foreAlpha: 0.90,
    dustColor: 0xce93d8, accentColor: '#ce93d8',
  },
  {
    label: 'VOLCANIC WASTELAND', score: 130,
    sky1: 0x0f0200, sky2: 0x050100,
    moon: null,
    starColor: 0xff6b35,
    stars: [[28,45],[72,22],[135,58],[188,32],[255,44],[312,18],[368,52],[430,28],[55,88],[162,78],[272,95],[388,82]],
    glowColor: 0xff4400,
    ground: 0x2a1000, groundTop: 0xcc4400, groundShadow: 0x0f0500,
    midKey: 'bg_mid_2', foreKey: 'bg_fore_2', midAlpha: 0.88, foreAlpha: 0.92,
    dustColor: 0xff5722, accentColor: '#ff6b35',
  },
  {
    label: 'NEON CITY', score: 220,
    sky1: 0x000814, sky2: 0x000000,
    moon: { color: 0x00e5ff, x: W-80, y: 42, r: 18, crescent: false },
    starColor: 0xff00ff,
    stars: [[18,32],[64,18],[120,52],[178,25],[240,60],[302,28],[358,44],[420,16],[45,85],[158,75],[265,90],[385,68]],
    glowColor: null,
    ground: 0x0a1020, groundTop: 0x00e5ff, groundShadow: 0x050810,
    midKey: 'bg_mid_3', foreKey: 'bg_fore_3', midAlpha: 0.92, foreAlpha: 0.95,
    dustColor: 0x00e5ff, accentColor: '#00e5ff',
  },
];

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx;
function beep(freq = 440, dur = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq; o.type = 'square';
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

// ── PRELOAD SCENE — loads all sprites from sprites/ dir ───────────────────────
class PreloadScene extends Phaser.Scene {
  constructor() { super('Preload'); }

  preload() {
    const BASE = 'sprites/';
    this.load.spritesheet('frog_sheet', BASE + 'frog_sheet.webp', { frameWidth: 64, frameHeight: 64 });
    this.load.spritesheet('bat_sheet',  BASE + 'bat_sheet.webp',  { frameWidth: 72, frameHeight: 36 });
    this.load.image('log',           BASE + 'log.webp');
    this.load.image('snake',         BASE + 'snake.webp');
    this.load.image('spore_cloud',   BASE + 'spore_cloud.webp');
    this.load.image('falling_rock',  BASE + 'falling_rock.webp');
    this.load.image('laser_grid',    BASE + 'laser_grid.webp');
    this.load.image('pickup_fly',    BASE + 'pickup_fly.webp');
    this.load.image('pickup_shroom', BASE + 'pickup_shroom.webp');
    this.load.image('pickup_shield', BASE + 'pickup_shield.webp');
    this.load.image('pickup_laser',  BASE + 'pickup_laser.webp');
    this.load.image('pickup_rage',   BASE + 'pickup_rage.webp');
    this.load.image('laser_beam',    BASE + 'laser_beam.webp');
    for (let i = 0; i < 4; i++) {
      this.load.image(`bg_mid_${i}`,  BASE + `bg_mid_${i}.webp`);
      this.load.image(`bg_fore_${i}`, BASE + `bg_fore_${i}.webp`);
    }
    // Particle textures: still procedural
    const d = this.make.graphics({ add: false });
    d.fillStyle(0x3d7a32); d.fillCircle(4, 4, 4);
    d.generateTexture('pdust', 8, 8); d.destroy();
    const s = this.make.graphics({ add: false });
    s.fillStyle(0x8bc34a); s.fillRect(0, 0, 5, 5);
    s.generateTexture('pstar', 5, 5); s.destroy();
  }

  create() { this.scene.start('Boot'); }
}

// ── BOOT SCENE — animation definitions only ───────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    // Frame layout: 0=run_a, 1=run_b, 2=jump, 3=dead, 4=laser
    this.anims.create({ key: 'frog_run',   frames: this.anims.generateFrameNumbers('frog_sheet', { start: 0, end: 1 }), frameRate: 9,  repeat: -1 });
    this.anims.create({ key: 'frog_jump',  frames: this.anims.generateFrameNumbers('frog_sheet', { start: 2, end: 2 }), frameRate: 1,  repeat:  0 });
    this.anims.create({ key: 'frog_dead',  frames: this.anims.generateFrameNumbers('frog_sheet', { start: 3, end: 3 }), frameRate: 1,  repeat:  0 });
    this.anims.create({ key: 'frog_laser', frames: this.anims.generateFrameNumbers('frog_sheet', { start: 4, end: 4 }), frameRate: 1,  repeat:  0 });
    this.anims.create({ key: 'bat_flap',   frames: this.anims.generateFrameNumbers('bat_sheet',  { start: 0, end: 1 }), frameRate: 8,  repeat: -1 });
    this.scene.start('Game');
  }
}

// ── GAME SCENE ────────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.gameStarted = false;
    this.dead        = false;
    this.score = 0; this.scoreTick = 0; this.elapsed = 0;
    this.speed = 280; this.spawnInterval = 2200; this.spawnTimer = 0;
    this.jumpCount = 0; this.isGrounded = true;
    this.deadTimer = 0; this.spinAngle = 0;
    this.transitioning = false;
    this.bgMidOld = null; this.bgForeOld = null;

    // Physics
    this.physics.world.gravity.y = 800;
    this.physics.world.setBounds(0, 0, W, H);

    // Draw biome 0 (sky, bg layers, ground — all at correct depths)
    this.skyGfx = null; this.groundGfx = null; this.bgMid = null; this.bgFore = null;
    this.biomeIdx = -1;
    this.initBiome(0);

    // Frog sprite (64x64)
    this.frog = this.physics.add.sprite(80, GY, 'frog_sheet', 0).setOrigin(0.5, 1).setDepth(5);
    this.frog.body.setCollideWorldBounds(true).setSize(48, 56).setOffset(8, 8);
    this.frog.play('frog_run');
    this.frog.setBlendMode(Phaser.BlendModes.ADD);

    // Ground collider
    this.groundBody = this.physics.add.staticImage(W/2, GY+10, null)
      .setVisible(false).setDisplaySize(W,20).refreshBody();
    this.physics.add.collider(this.frog, this.groundBody, () => this.onLand());

    // Obstacles (depth 4)
    this.obstacles = this.physics.add.group();
    this.physics.add.overlap(this.frog, this.obstacles, () => { this.die(); });

    // Particles
    this.dustEmitter = this.add.particles(0, 0, 'pdust', {
      speed: { min:30, max:90 }, angle: { min:200, max:340 },
      scale: { start:0.9, end:0 }, alpha: { start:0.7, end:0 },
      lifespan: 380, quantity: 1, emitting: false,
    }).setDepth(6);

    this.deathEmitter = this.add.particles(0, 0, 'pstar', {
      speed: { min:70, max:190 }, angle: { min:0, max:360 },
      scale: { start:1, end:0 }, alpha: { start:1, end:0 },
      lifespan: 650, quantity: 1,
      tint: [0x4a8c3f, 0x8bc34a, 0xd4e8a0, 0xffffff],
      emitting: false,
    }).setDepth(6);

    // Score UI (depth 9–10)
    const uiBg = this.add.graphics().setDepth(9);
    uiBg.fillStyle(0x000000, 0.42);
    uiBg.fillRoundedRect(W-92, 8, 84, 46, 4);

    this.scoreTxt = this.add.text(W-14, 13, '0m', {
      fontSize:'18px', fontFamily:'monospace', color:'#c8e6c9', stroke:'#000000', strokeThickness:3
    }).setOrigin(1,0).setDepth(10);

    const best = parseInt(localStorage.getItem('dashfrog_best') || '0');
    this.bestTxt = this.add.text(W-14, 35, best > 0 ? `Best: ${best}m` : '', {
      fontSize:'12px', fontFamily:'monospace', color:'#8bc34a', stroke:'#000000', strokeThickness:2
    }).setOrigin(1,0).setDepth(10);

    // Start overlay (depth 10)
    this.startOverlay = this.add.container(W/2, H/2-55).setDepth(10);
    const olBg = this.add.graphics();
    olBg.fillStyle(0x000000, 0.52); olBg.fillRoundedRect(-128,-18,256,138,7);
    olBg.fillStyle(0x2d5a27, 0.4);  olBg.fillRect(-126,-16,252,2);
    const olTitle = this.add.text(0,0,'DASH FROG',{fontSize:'38px',fontFamily:'monospace',color:'#8bc34a',stroke:'#2d5a27',strokeThickness:4}).setOrigin(0.5);
    const bestVal = parseInt(localStorage.getItem('dashfrog_best')||'0');
    const olBest  = this.add.text(0,50, bestVal > 0 ? `Best: ${bestVal}m` : '',{fontSize:'16px',fontFamily:'monospace',color:'#c8e6c9'}).setOrigin(0.5);
    this.tapTxt   = this.add.text(0,94,'TAP TO START',{fontSize:'20px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
    this.startOverlay.add([olBg, olTitle, olBest, this.tapTxt]);
    this.tweens.add({ targets: this.tapTxt, alpha: 0, duration: 500, yoyo: true, repeat: -1 });

    // Input
    this.input.on('pointerdown', () => this.handleTap());
    this.input.keyboard && this.input.keyboard.on('keydown-SPACE', () => this.handleTap());

    this.events.once('shutdown', () => {
      this.dustEmitter.destroy();
      this.deathEmitter.destroy();
    });
  }

  // ── BIOME SYSTEM ─────────────────────────────────────────────────────────────
  _createSky(b) {
    const g = this.add.graphics().setDepth(0);
    g.fillGradientStyle(b.sky1, b.sky1, b.sky2, b.sky2, 1);
    g.fillRect(0, 0, W, H);
    if (b.glowColor) {
      g.fillStyle(b.glowColor, 0.12); g.fillRect(0, H * 0.5, W, H * 0.5);
      g.fillStyle(b.glowColor, 0.06); g.fillRect(0, H * 0.3, W, H * 0.2);
    }
    if (b.moon) {
      const m = b.moon;
      g.fillStyle(m.color, 0.9); g.fillCircle(m.x, m.y, m.r);
      if (m.crescent) {
        g.fillStyle(b.sky2, 0.75); g.fillCircle(m.x + 9, m.y - 6, m.r - 3);
      }
    }
    g.fillStyle(b.starColor, 0.5);
    for (const [x, y] of b.stars) g.fillRect(x, y, 2, 2);
    return g;
  }

  _createGround(b) {
    const g = this.add.graphics().setDepth(3);
    g.fillStyle(b.ground);       g.fillRect(0, GY, W, H - GY);
    g.fillStyle(b.groundTop);    g.fillRect(0, GY, W, 5);
    g.fillStyle(b.groundShadow); g.fillRect(0, GY + 5, W, 4);
    return g;
  }

  initBiome(idx) {
    const b = BIOMES[idx];
    this.biomeIdx = idx;
    if (this.skyGfx)    this.skyGfx.destroy();
    if (this.groundGfx) this.groundGfx.destroy();
    if (this.bgMid)     this.bgMid.destroy();
    if (this.bgFore)    this.bgFore.destroy();
    this.skyGfx    = this._createSky(b);
    this.groundGfx = this._createGround(b);
    this.bgMid  = this.add.tileSprite(0, H-172, W, 120, b.midKey).setOrigin(0,1).setDepth(1).setAlpha(b.midAlpha);
    this.bgFore = this.add.tileSprite(0, GY+2,  W,  40, b.foreKey).setOrigin(0,1).setDepth(2).setAlpha(b.foreAlpha);
  }

  transitionBiome(idx) {
    if (this.transitioning || idx === this.biomeIdx) return;
    this.transitioning = true;
    const b = BIOMES[idx];
    const dur = 2400;

    const nSky    = this._createSky(b);    nSky.setAlpha(0);
    const nGround = this._createGround(b); nGround.setAlpha(0);
    const nMid  = this.add.tileSprite(0, H-172, W, 120, b.midKey).setOrigin(0,1).setDepth(1).setAlpha(0);
    const nFore = this.add.tileSprite(0, GY+2,  W,  40, b.foreKey).setOrigin(0,1).setDepth(2).setAlpha(0);
    nMid.tilePositionX  = this.bgMid.tilePositionX;
    nFore.tilePositionX = this.bgFore.tilePositionX;

    const oSky = this.skyGfx, oGround = this.groundGfx;
    const oMid = this.bgMid,  oFore   = this.bgFore;

    // Track old layers for scrolling during transition
    this.bgMidOld  = oMid;
    this.bgForeOld = oFore;
    this.skyGfx    = nSky;
    this.groundGfx = nGround;
    this.bgMid     = nMid;
    this.bgFore    = nFore;
    this.biomeIdx  = idx;

    this.tweens.add({ targets: nSky,    alpha: 1,          duration: dur, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: nGround, alpha: 1,          duration: dur, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: nMid,    alpha: b.midAlpha, duration: dur, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: nFore,   alpha: b.foreAlpha,duration: dur, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: oSky,    alpha: 0, duration: dur, ease: 'Sine.easeInOut', onComplete: () => oSky.destroy() });
    this.tweens.add({ targets: oGround, alpha: 0, duration: dur, ease: 'Sine.easeInOut', onComplete: () => oGround.destroy() });
    this.tweens.add({ targets: oMid,    alpha: 0, duration: dur, ease: 'Sine.easeInOut', onComplete: () => { oMid.destroy();  this.bgMidOld  = null; } });
    this.tweens.add({ targets: oFore,   alpha: 0, duration: dur, ease: 'Sine.easeInOut', onComplete: () => { oFore.destroy(); this.bgForeOld = null; this.transitioning = false; } });

    this._showBiomeLabel(b.label, b.accentColor);
  }

  _showBiomeLabel(label, color) {
    const txt = this.add.text(W/2, GY * 0.28, `\u2014 ${label} \u2014`, {
      fontSize: '15px', fontFamily: 'monospace', color: color || '#ffffff',
      stroke: '#000000', strokeThickness: 3,
    }).setOrigin(0.5).setDepth(11).setAlpha(0);
    this.tweens.add({
      targets: txt, alpha: 1, duration: 500, ease: 'Linear',
      onComplete: () => this.tweens.add({
        targets: txt, alpha: 0, duration: 700, delay: 1800, ease: 'Linear',
        onComplete: () => txt.destroy(),
      }),
    });
  }

  // ── GAME LOGIC ────────────────────────────────────────────────────────────────
  handleTap() {
    if (this.dead) return;
    if (!this.gameStarted) { this.startGame(); return; }
    if (this.isGrounded) { this.jump(-520); }
    else if (this.jumpCount < 2) { this.jump(-420); }
  }

  jump(vel) {
    this.frog.body.velocity.y = vel;
    this.jumpCount++; this.isGrounded = false;
    this.frog.play('frog_jump', true);
    beep(vel === -520 ? 440 : 600, 0.07);
  }

  onLand() {
    if (!this.isGrounded && !this.dead) {
      this.isGrounded = true; this.jumpCount = 0;
      this.dustEmitter.explode(8, this.frog.x, this.frog.y);
      this.frog.setScale(1.2, 0.7);
      this.tweens.add({
        targets: this.frog, scaleX: 1, scaleY: 1, duration: 80, ease: 'Back.easeOut',
        onComplete: () => { if (!this.dead) this.frog.play('frog_run', true); }
      });
    }
  }

  startGame() {
    this.gameStarted = true;
    this.startOverlay.setVisible(false);
    this.spawnTimer = this.spawnInterval;
  }

  spawnObstacle() {
    const isLog = Phaser.Math.Between(0, 10) < 6;
    let obs;
    if (isLog) {
      obs = this.obstacles.create(W + 40, GY, 'log').setOrigin(0.5, 1).setDepth(4);
      obs.body.setAllowGravity(false).setImmovable(true).setSize(36, 72).setOffset(2, 8);
      obs.setBlendMode(Phaser.BlendModes.ADD);
    } else {
      const batY = GY - 64 - 64 - 12;
      obs = this.obstacles.create(W + 40, batY, 'bat_sheet', 0).setOrigin(0.5, 0.5).setDepth(4);
      obs.body.setAllowGravity(false).setImmovable(true).setSize(56, 24).setOffset(8, 6);
      obs.play('bat_flap');
      obs.setBlendMode(Phaser.BlendModes.ADD);
    }
    obs.obsSpeed = this.speed;
  }

  die() {
    if (this.dead) return;
    this.dead = true;
    this.frog.body.velocity.x = 0;
    this.frog.play('frog_dead', true);
    this.deathEmitter.explode(22, this.frog.x, this.frog.y - 14);
    beep(180, 0.3);
    const prev = parseInt(localStorage.getItem('dashfrog_best') || '0');
    if (this.score > prev) localStorage.setItem('dashfrog_best', this.score);
    this.deadTimer = 0; this.spinAngle = 0;
  }

  updateDifficulty() {
    const t = this.elapsed;
    if      (t < 10) { this.speed = 280; this.spawnInterval = 2200; }
    else if (t < 20) { this.speed = 320; this.spawnInterval = 2000; }
    else if (t < 30) { this.speed = 370; this.spawnInterval = 1800; }
    else if (t < 40) { this.speed = 420; this.spawnInterval = 1600; }
    else             { this.speed = 480; this.spawnInterval = 1400; }
  }

  update(time, delta) {
    const dt = delta / 1000;

    // Scroll parallax (both current and outgoing layers during transition)
    if (this.gameStarted && !this.dead) {
      const ms = this.speed * 0.18 * dt;
      const fs = this.speed * 0.52 * dt;
      this.bgMid.tilePositionX  += ms;
      this.bgFore.tilePositionX += fs;
      if (this.bgMidOld)  this.bgMidOld.tilePositionX  += ms;
      if (this.bgForeOld) this.bgForeOld.tilePositionX += fs;
    }

    if (!this.gameStarted || this.dead) {
      if (this.dead) {
        this.deadTimer += dt; this.spinAngle += 540 * dt;
        this.frog.setAngle(this.spinAngle);
        if (this.deadTimer > 1.2) this.scene.start('GameOver', { score: this.score });
      }
      return;
    }

    this.elapsed += dt;
    this.updateDifficulty();
    this.scoreTick += dt;
    if (this.scoreTick >= 0.1) { this.scoreTick -= 0.1; this.score++; }
    this.scoreTxt.setText(this.score + 'm');

    // Biome check
    if (!this.transitioning) {
      for (let i = BIOMES.length - 1; i > this.biomeIdx; i--) {
        if (this.score >= BIOMES[i].score) { this.transitionBiome(i); break; }
      }
    }

    this.spawnTimer -= delta;
    if (this.spawnTimer <= 0) {
      this.spawnObstacle();
      this.spawnTimer = this.spawnInterval + Phaser.Math.Between(-200, 200);
    }
    this.obstacles.getChildren().forEach(obs => {
      obs.x -= (obs.obsSpeed || this.speed) * dt;
      if (obs.x < -80) obs.destroy();
    });
    if (this.frog.body.blocked.down) { if (!this.isGrounded) this.onLand(); }
    else if (this.frog.y < GY - 32)  { this.isGrounded = false; }
  }
}

// ── GAME OVER SCENE ───────────────────────────────────────────────────────────
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  create(data) {
    const score = data.score || 0;
    const best  = parseInt(localStorage.getItem('dashfrog_best') || '0');

    const sky = this.add.graphics();
    sky.fillGradientStyle(0x0d1a0d, 0x0d1a0d, 0x060d06, 0x060d06, 1);
    sky.fillRect(0, 0, W, H);
    sky.fillStyle(0xd4e8a0, 0.9); sky.fillCircle(W-52,52,22);
    sky.fillStyle(0x060d06, 0.6); sky.fillCircle(W-43,46,19);

    const panel = this.add.graphics();
    panel.fillStyle(0x000000, 0.72); panel.fillRoundedRect(W/2-155, H/2-155, 310, 248, 8);
    panel.fillStyle(0x4a8c3f, 0.5);  panel.fillRect(W/2-153, H/2-153, 306, 2);

    this.add.text(W/2, H/2-115,'GAME OVER',{fontSize:'36px',fontFamily:'monospace',color:'#ff4444',stroke:'#000000',strokeThickness:4}).setOrigin(0.5);
    this.add.text(W/2, H/2-52, `Score: ${score}m`,{fontSize:'26px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
    this.add.text(W/2, H/2,    `Best: ${best}m`,  {fontSize:'20px',fontFamily:'monospace',color:'#8bc34a',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);

    const tapTxt = this.add.text(W/2, H/2+72,'TAP TO RETRY',{fontSize:'20px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
    this.tweens.add({ targets: tapTxt, alpha: 0, duration: 500, yoyo: true, repeat: -1 });

    const burst = this.add.particles(W/2, H/2-130, 'pstar', {
      speed:{min:50,max:160}, angle:{min:0,max:360},
      scale:{start:1,end:0}, alpha:{start:1,end:0}, lifespan:800,
      tint:[0x4a8c3f,0x8bc34a,0xd4e8a0], quantity:1, emitting:false,
    });
    burst.explode(24);

    this.time.delayedCall(400, () => {
      this.input.on('pointerdown', () => this.scene.start('Game'));
      this.input.keyboard && this.input.keyboard.on('keydown-SPACE', () => this.scene.start('Game'));
    });
    this.events.once('shutdown', () => burst.destroy());
  }
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
window.__phaserGame = new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#060d06',
  physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
  scene: [PreloadScene, BootScene, GameScene, GameOverScene],
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  parent: document.body,
  render: { antialias: true },
});
</script>
