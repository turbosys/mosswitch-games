<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dash Frog</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060d06; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const W = Math.min(window.innerWidth, 480);
const H = Math.round(W * (640 / 480));
const GY = H - 60;

const P = {
  sky1: 0x0d1a0d, sky2: 0x060d06,
  ground: 0x2d5a27, groundTop: 0x3d7a32, groundShadow: 0x1a4a18,
  frog: 0x4a8c3f, frogLight: 0x6ab85e, frogDark: 0x2d5a27, frogBelly: 0x8fd67f,
  log: 0x5d4037, logDark: 0x3e2723, logLight: 0x6d4c41,
  bat: 0x4a148c, batWing: 0x7b1fa2, batDark: 0x2d0057,
  tree: 0x1a3d18, treeDark: 0x0f2410, reed: 0x2d6b27,
  moon: 0xd4e8a0, star: 0x8bc34a, accent: 0x8bc34a,
};

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx;
function beep(freq = 440, dur = 0.08) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq; o.type = 'square';
    g.gain.setValueAtTime(0.12, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

// ── BOOT SCENE — generates all textures ──────────────────────────────────────
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    this._makeFrogSheet();
    this._makeBatSheet();
    this._makeLog();
    this._makeParticles();
    this._makeBgMid();
    this._makeBgFore();

    this.anims.create({ key: 'frog_run',  frames: this.anims.generateFrameNumbers('frog_sheet', { start: 0, end: 1 }), frameRate: 9,  repeat: -1 });
    this.anims.create({ key: 'frog_jump', frames: this.anims.generateFrameNumbers('frog_sheet', { start: 2, end: 2 }), frameRate: 1,  repeat:  0 });
    this.anims.create({ key: 'frog_dead', frames: this.anims.generateFrameNumbers('frog_sheet', { start: 3, end: 3 }), frameRate: 1,  repeat:  0 });
    this.anims.create({ key: 'bat_flap',  frames: this.anims.generateFrameNumbers('bat_sheet',  { start: 0, end: 1 }), frameRate: 8,  repeat: -1 });

    this.scene.start('Game');
  }

  _g() { return this.make.graphics({ x: 0, y: 0, add: false }); }

  // Frog spritesheet 128×32  (4 frames × 32×32)
  _makeFrogSheet() {
    const g = this._g();
    for (let f = 0; f < 4; f++) this._frogFrame(g, f * 32, f);
    g.generateTexture('frog_sheet', 128, 32);
    g.destroy();
  }

  _frogFrame(g, ox, frame) {
    const { frog: F, frogLight: FL, frogDark: FD, frogBelly: FB } = P;
    if (frame === 3) {
      // Dead: belly-up, x-eyes, legs in air
      g.fillStyle(F);   g.fillRoundedRect(ox+4, 5, 24, 18, 5);
      g.fillStyle(FB);  g.fillRoundedRect(ox+8, 7, 16, 11, 4);
      g.fillStyle(FD);  g.fillRect(ox+8, 5, 16, 4);
      g.fillStyle(FL);  g.fillCircle(ox+9, 26, 5); g.fillCircle(ox+23, 26, 5);
      g.fillStyle(0xffffff); g.fillCircle(ox+9, 25, 3); g.fillCircle(ox+23, 25, 3);
      // X eyes (two crossing rects per eye)
      g.fillStyle(0x222222);
      g.fillRect(ox+6,23,6,2); g.fillRect(ox+8,21,2,6);
      g.fillRect(ox+20,23,6,2); g.fillRect(ox+22,21,2,6);
      // Legs pointing up
      g.fillStyle(FD); g.fillRect(ox+4,1,8,7);  g.fillRect(ox+20,1,8,7);
      g.fillStyle(F);  g.fillRect(ox+2,1,10,3); g.fillRect(ox+20,1,10,3);
      return;
    }
    // Shared body for frames 0–2
    g.fillStyle(F);  g.fillRoundedRect(ox+4, 8, 24, 18, 5);
    g.fillStyle(FB); g.fillRoundedRect(ox+8,14, 16, 10, 4);
    g.fillStyle(FD); g.fillRect(ox+8, 8, 16, 4);
    // Spots
    g.fillStyle(FD); g.fillCircle(ox+12,14,2); g.fillCircle(ox+20,14,2);
    // Eye bumps
    g.fillStyle(FL);      g.fillCircle(ox+9, 7,5); g.fillCircle(ox+23,7,5);
    g.fillStyle(0xffffff); g.fillCircle(ox+9, 6,3); g.fillCircle(ox+23,6,3);
    g.fillStyle(0x111111); g.fillCircle(ox+9, 6,2); g.fillCircle(ox+23,6,2);
    g.fillStyle(0xffffff); g.fillCircle(ox+8, 5,1); g.fillCircle(ox+22,5,1);
    g.fillStyle(FD);       g.fillCircle(ox+13,11,1); g.fillCircle(ox+19,11,1);
    // Legs — frame-specific
    if (frame === 0) {
      g.fillStyle(FD); g.fillRect(ox+4,22,7,7); g.fillRect(ox+21,22,7,5);
      g.fillStyle(F);  g.fillRect(ox+1,27,11,4); g.fillRect(ox+20,25,9,3);
    } else if (frame === 1) {
      g.fillStyle(FD); g.fillRect(ox+4,22,7,5); g.fillRect(ox+21,22,7,7);
      g.fillStyle(F);  g.fillRect(ox+1,25,9,3); g.fillRect(ox+20,27,11,4);
    } else { // jump
      g.fillStyle(FD); g.fillRect(ox+5,20,8,7); g.fillRect(ox+19,20,8,7);
      g.fillStyle(F);  g.fillRect(ox+3,25,10,5); g.fillRect(ox+19,25,10,5);
    }
  }

  // Bat spritesheet 72×18  (2 frames × 36×18)
  _makeBatSheet() {
    const g = this._g();
    this._batFrame(g, 0,  false); // wings up
    this._batFrame(g, 36, true);  // wings down
    g.generateTexture('bat_sheet', 72, 18);
    g.destroy();
  }

  _batFrame(g, ox, down) {
    const { bat: B, batWing: BW, batDark: BD } = P;
    // Wings
    g.fillStyle(BW);
    if (down) {
      g.fillTriangle(ox+11,6, ox+0,15,  ox+8,17);
      g.fillTriangle(ox+25,6, ox+36,15, ox+28,17);
    } else {
      g.fillTriangle(ox+11,9, ox+0,2,  ox+7,14);
      g.fillTriangle(ox+25,9, ox+36,2, ox+29,14);
    }
    // Wing membrane hint (thin dark rect along each wing)
    g.fillStyle(BD);
    if (down) {
      g.fillTriangle(ox+11,7, ox+2,15,  ox+5,16);
      g.fillTriangle(ox+25,7, ox+34,15, ox+31,16);
    } else {
      g.fillTriangle(ox+11,9, ox+2,3,  ox+5,13);
      g.fillTriangle(ox+25,9, ox+34,3, ox+31,13);
    }
    // Body
    g.fillStyle(B);  g.fillEllipse(ox+18,9,16,11);
    // Ear nubs
    g.fillStyle(BD);
    g.fillTriangle(ox+13,5, ox+11,1, ox+17,3);
    g.fillTriangle(ox+23,5, ox+25,1, ox+19,3);
    // Eyes
    g.fillStyle(0xff4444); g.fillCircle(ox+15,8,2); g.fillCircle(ox+21,8,2);
    g.fillStyle(0xffffff); g.fillCircle(ox+14,7,1); g.fillCircle(ox+20,7,1);
    // Fangs
    g.fillStyle(0xffffff);
    g.fillTriangle(ox+15,13, ox+14,17, ox+16,17);
    g.fillTriangle(ox+21,13, ox+20,17, ox+22,17);
  }

  // Log 20×40
  _makeLog() {
    const g = this._g();
    g.fillStyle(P.log);      g.fillRect(0,0,20,40);
    g.fillStyle(P.logDark);  g.fillRect(2,0,3,40); g.fillRect(15,0,3,40);
    // Top end-cap
    g.fillStyle(P.logLight); g.fillEllipse(10,2,18,7);
    // Annual rings on cap (filled circles, progressively smaller/darker)
    g.fillStyle(P.log);      g.fillEllipse(10,2,12,5);
    g.fillStyle(P.logLight); g.fillEllipse(10,2,6,3);
    g.fillStyle(P.logDark);  g.fillEllipse(10,2,2,2);
    // Bottom shadow
    g.fillStyle(P.logDark);  g.fillEllipse(10,38,18,6);
    // Bark rings
    g.fillStyle(P.logLight); g.fillRect(0,9,20,2); g.fillRect(0,21,20,2); g.fillRect(0,33,20,2);
    // Knot
    g.fillStyle(P.logDark);  g.fillEllipse(10,28,8,6);
    g.fillStyle(0x1a0a08);   g.fillEllipse(10,28,4,3);
    g.generateTexture('log', 20, 40);
    g.destroy();
  }

  // Particle textures
  _makeParticles() {
    const d = this._g();
    d.fillStyle(P.groundTop); d.fillCircle(4,4,4);
    d.generateTexture('pdust', 8, 8); d.destroy();

    const s = this._g();
    s.fillStyle(P.accent); s.fillRect(0,0,5,5);
    s.generateTexture('pstar', 5, 5); s.destroy();
  }

  // Mid BG 480×120 — swamp tree silhouettes (fill only, no stroke)
  _makeBgMid() {
    const g = this._g();
    const TH = 120;
    const trees = [
      {x:32, h:88,w:18},{x:85, h:68,w:14},{x:145,h:98,w:20},{x:205,h:62,w:14},
      {x:265,h:84,w:18},{x:325,h:72,w:14},{x:390,h:94,w:20},{x:450,h:58,w:12},
    ];
    for (const t of trees) {
      // Trunk
      g.fillStyle(P.tree);     g.fillRect(t.x-t.w/2, TH-t.h, t.w, t.h);
      g.fillStyle(P.treeDark); g.fillRect(t.x-t.w/2, TH-t.h, 3,   t.h);
      // Crown triangle
      g.fillStyle(P.tree);
      g.fillTriangle(t.x, TH-t.h-28, t.x-t.w*2, TH-t.h+18, t.x+t.w*2, TH-t.h+18);
      // Branch stubs (thin filled rects at an angle approximation)
      g.fillStyle(P.tree);
      g.fillRect(t.x-t.w*2-2, TH-t.h-10, t.w*2, 3);   // left branch
      g.fillRect(t.x+2,       TH-t.h-14, t.w*2, 3);   // right branch
      // Moss strands (thin rects)
      g.fillStyle(P.treeDark);
      for (let mx = t.x - t.w + 2; mx < t.x + t.w; mx += 6) {
        const mh = 8 + ((mx * 7 + t.h) % 13);
        g.fillRect(mx, TH-t.h+16, 1, mh);
      }
    }
    // Ground fog band
    g.fillStyle(P.treeDark); g.fillRect(0, TH-18, 480, 18);
    g.generateTexture('bg_mid', 480, 120);
    g.destroy();
  }

  // Fore BG 480×40 — reeds, lily pads, pebbles (fill only)
  _makeBgFore() {
    const g = this._g();
    const TH = 40;
    // Reeds
    const reedX = [8,38,72,110,148,190,230,272,310,355,395,440];
    for (const rx of reedX) {
      const n = 2 + (rx % 3);
      for (let i = 0; i < n; i++) {
        const x = rx + i * 7, rh = 18 + (x % 14);
        g.fillStyle(P.reed);   g.fillRect(x, TH-rh, 2, rh);
        g.fillStyle(P.accent); g.fillEllipse(x+1, TH-rh, 5, 9);
      }
    }
    // Lily pads
    for (const px of [22,90,175,255,340,420]) {
      const pw = 14 + (px % 10);
      g.fillStyle(P.ground);   g.fillEllipse(px, TH-6, pw, 8);
      g.fillStyle(P.frogDark); g.fillRect(px-1, TH-10, 2, 8); // notch line
    }
    // Pebbles
    for (const bx of [50,130,210,290,370,460]) {
      g.fillStyle(P.frogDark); g.fillCircle(bx, TH-4, 2+(bx%3));
    }
    g.generateTexture('bg_fore', 480, 40);
    g.destroy();
  }
}

// ── GAME SCENE ────────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.gameStarted = false;
    this.dead        = false;
    this.score = 0; this.scoreTick = 0; this.elapsed = 0;
    this.speed = 280; this.spawnInterval = 2200; this.spawnTimer = 0;
    this.jumpCount = 0; this.isGrounded = true;
    this.deadTimer = 0; this.spinAngle = 0;

    // Sky (depth 0, static)
    const sky = this.add.graphics().setDepth(0);
    sky.fillGradientStyle(P.sky1, P.sky1, P.sky2, P.sky2, 1);
    sky.fillRect(0, 0, W, H);
    sky.fillStyle(P.moon, 0.9);  sky.fillCircle(W-52, 52, 22);
    sky.fillStyle(P.sky2, 0.6);  sky.fillCircle(W-43, 46, 19); // crescent shadow
    sky.fillStyle(P.star, 0.5);
    [[22,28],[65,14],[118,44],[182,19],[244,52],[308,24],[355,38],[418,13],
     [48,78],[155,68],[258,82],[385,72]].forEach(([x,y]) => sky.fillRect(x,y,2,2));

    // Parallax layers (depths 1–2)
    this.bgMid  = this.add.tileSprite(0, H-172, W, 120, 'bg_mid').setOrigin(0,1).setDepth(1).setAlpha(0.82);
    this.bgFore = this.add.tileSprite(0, GY+2,  W,  40, 'bg_fore').setOrigin(0,1).setDepth(2).setAlpha(0.88);

    // Ground (depth 3)
    const gGfx = this.add.graphics().setDepth(3);
    gGfx.fillStyle(P.ground);       gGfx.fillRect(0,GY,    W,H-GY);
    gGfx.fillStyle(P.groundTop);    gGfx.fillRect(0,GY,    W,5);
    gGfx.fillStyle(P.groundShadow); gGfx.fillRect(0,GY+5,  W,4);

    // Physics
    this.physics.world.gravity.y = 800;
    this.physics.world.setBounds(0, 0, W, H);

    // Frog sprite (depth 5)
    this.frog = this.physics.add.sprite(80, GY-32, 'frog_sheet', 0).setOrigin(0.5,1).setDepth(5);
    this.frog.body.setCollideWorldBounds(true).setSize(26,28).setOffset(3,4);
    this.frog.play('frog_run');

    // Ground collider
    this.groundBody = this.physics.add.staticImage(W/2, GY+10, null)
      .setVisible(false).setDisplaySize(W,20).refreshBody();
    this.physics.add.collider(this.frog, this.groundBody, () => this.onLand());

    // Obstacles (depth 4)
    this.obstacles = this.physics.add.group();
    this.physics.add.overlap(this.frog, this.obstacles, () => this.die());

    // Particles (Phaser 3.60 API: emitting:false instead of on:false)
    this.dustEmitter = this.add.particles(0, 0, 'pdust', {
      speed: { min:30, max:90 }, angle: { min:200, max:340 },
      scale: { start:0.9, end:0 }, alpha: { start:0.7, end:0 },
      lifespan: 380, quantity: 1, emitting: false,
    }).setDepth(6);

    this.deathEmitter = this.add.particles(0, 0, 'pstar', {
      speed: { min:70, max:190 }, angle: { min:0, max:360 },
      scale: { start:1, end:0 }, alpha: { start:1, end:0 },
      lifespan: 650, quantity: 1,
      tint: [0x4a8c3f, 0x8bc34a, 0xd4e8a0, 0xffffff],
      emitting: false,
    }).setDepth(6);

    // Score UI (depth 9–10)
    const uiBg = this.add.graphics().setDepth(9);
    uiBg.fillStyle(0x000000, 0.42);
    uiBg.fillRoundedRect(W-92, 8, 84, 46, 4);

    this.scoreTxt = this.add.text(W-14, 13, '0m', {
      fontSize:'18px', fontFamily:'monospace', color:'#c8e6c9', stroke:'#000000', strokeThickness:3
    }).setOrigin(1,0).setDepth(10);

    const best = parseInt(localStorage.getItem('dashfrog_best') || '0');
    this.bestTxt = this.add.text(W-14, 35, best > 0 ? `Best: ${best}m` : '', {
      fontSize:'12px', fontFamily:'monospace', color:'#8bc34a', stroke:'#000000', strokeThickness:2
    }).setOrigin(1,0).setDepth(10);

    // Start overlay (depth 10)
    this.startOverlay = this.add.container(W/2, H/2-55).setDepth(10);
    const olBg = this.add.graphics();
    olBg.fillStyle(0x000000, 0.52); olBg.fillRoundedRect(-128,-18,256,138,7);
    olBg.fillStyle(0x2d5a27, 0.4);  olBg.fillRect(-126,-16,252,2); // top accent line
    const olTitle = this.add.text(0,0,'DASH FROG',{fontSize:'38px',fontFamily:'monospace',color:'#8bc34a',stroke:'#2d5a27',strokeThickness:4}).setOrigin(0.5);
    const bestVal = parseInt(localStorage.getItem('dashfrog_best')||'0');
    const olBest  = this.add.text(0,50, bestVal > 0 ? `Best: ${bestVal}m` : '',{fontSize:'16px',fontFamily:'monospace',color:'#c8e6c9'}).setOrigin(0.5);
    this.tapTxt   = this.add.text(0,94,'TAP TO START',{fontSize:'20px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
    this.startOverlay.add([olBg, olTitle, olBest, this.tapTxt]);
    this.tweens.add({ targets: this.tapTxt, alpha: 0, duration: 500, yoyo: true, repeat: -1 });

    // Input
    this.input.on('pointerdown', () => this.handleTap());
    this.input.keyboard && this.input.keyboard.on('keydown-SPACE', () => this.handleTap());

    // Cleanup emitters on shutdown to prevent leaks on scene restart
    this.events.once('shutdown', () => {
      this.dustEmitter.destroy();
      this.deathEmitter.destroy();
    });
  }

  handleTap() {
    if (this.dead) return;
    if (!this.gameStarted) { this.startGame(); return; }
    if (this.isGrounded) { this.jump(-520); }
    else if (this.jumpCount < 2) { this.jump(-420); }
  }

  jump(vel) {
    this.frog.body.velocity.y = vel;
    this.jumpCount++; this.isGrounded = false;
    this.frog.play('frog_jump', true);
    beep(vel === -520 ? 440 : 600, 0.07);
  }

  onLand() {
    if (!this.isGrounded && !this.dead) {
      this.isGrounded = true; this.jumpCount = 0;
      this.dustEmitter.explode(8, this.frog.x, this.frog.y);
      this.frog.setScale(1.2, 0.7);
      this.tweens.add({
        targets: this.frog, scaleX: 1, scaleY: 1, duration: 80, ease: 'Back.easeOut',
        onComplete: () => { if (!this.dead) this.frog.play('frog_run', true); }
      });
    }
  }

  startGame() {
    this.gameStarted = true;
    this.startOverlay.setVisible(false);
    this.spawnTimer = this.spawnInterval;
  }

  spawnObstacle() {
    const isLog = Phaser.Math.Between(0, 10) < 6;
    let obs;
    if (isLog) {
      obs = this.obstacles.create(W+20, GY-40, 'log').setOrigin(0.5,1).setDepth(4);
      obs.body.setAllowGravity(false).setImmovable(true).setSize(18,36).setOffset(1,4);
    } else {
      const batY = GY - 32 - 32 - 8;
      obs = this.obstacles.create(W+20, batY, 'bat_sheet', 0).setOrigin(0.5,0.5).setDepth(4);
      obs.body.setAllowGravity(false).setImmovable(true).setSize(28,12).setOffset(4,3);
      obs.play('bat_flap');
    }
    obs.obsSpeed = this.speed;
  }

  die() {
    if (this.dead) return;
    this.dead = true;
    this.frog.body.velocity.x = 0;
    this.frog.play('frog_dead', true);
    this.deathEmitter.explode(22, this.frog.x, this.frog.y - 14);
    beep(180, 0.3);
    const prev = parseInt(localStorage.getItem('dashfrog_best') || '0');
    if (this.score > prev) localStorage.setItem('dashfrog_best', this.score);
    this.deadTimer = 0; this.spinAngle = 0;
  }

  updateDifficulty() {
    const t = this.elapsed;
    if      (t < 10) { this.speed = 280; this.spawnInterval = 2200; }
    else if (t < 20) { this.speed = 320; this.spawnInterval = 2000; }
    else if (t < 30) { this.speed = 370; this.spawnInterval = 1800; }
    else if (t < 40) { this.speed = 420; this.spawnInterval = 1600; }
    else             { this.speed = 480; this.spawnInterval = 1400; }
  }

  update(time, delta) {
    const dt = delta / 1000;
    if (this.gameStarted && !this.dead) {
      this.bgMid.tilePositionX  += this.speed * 0.18 * dt;
      this.bgFore.tilePositionX += this.speed * 0.52 * dt;
    }
    if (!this.gameStarted || this.dead) {
      if (this.dead) {
        this.deadTimer += dt; this.spinAngle += 540 * dt;
        this.frog.setAngle(this.spinAngle);
        if (this.deadTimer > 1.2) this.scene.start('GameOver', { score: this.score });
      }
      return;
    }
    this.elapsed += dt;
    this.updateDifficulty();
    this.scoreTick += dt;
    if (this.scoreTick >= 0.1) { this.scoreTick -= 0.1; this.score++; }
    this.scoreTxt.setText(this.score + 'm');
    this.spawnTimer -= delta;
    if (this.spawnTimer <= 0) {
      this.spawnObstacle();
      this.spawnTimer = this.spawnInterval + Phaser.Math.Between(-200, 200);
    }
    this.obstacles.getChildren().forEach(obs => {
      obs.x -= (obs.obsSpeed || this.speed) * dt;
      if (obs.x < -80) obs.destroy();
    });
    if (this.frog.body.blocked.down) { if (!this.isGrounded) this.onLand(); }
    else if (this.frog.y < GY - 32)  { this.isGrounded = false; }
  }
}

// ── GAME OVER SCENE ───────────────────────────────────────────────────────────
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOver'); }

  create(data) {
    const score = data.score || 0;
    const best  = parseInt(localStorage.getItem('dashfrog_best') || '0');

    // Sky (no flash to black)
    const sky = this.add.graphics();
    sky.fillGradientStyle(P.sky1, P.sky1, P.sky2, P.sky2, 1);
    sky.fillRect(0, 0, W, H);
    sky.fillStyle(P.moon, 0.9);  sky.fillCircle(W-52,52,22);
    sky.fillStyle(P.sky2, 0.6);  sky.fillCircle(W-43,46,19);

    const panel = this.add.graphics();
    panel.fillStyle(0x000000, 0.72); panel.fillRoundedRect(W/2-155, H/2-155, 310, 248, 8);
    panel.fillStyle(0x4a8c3f, 0.5);  panel.fillRect(W/2-153, H/2-153, 306, 2);

    this.add.text(W/2, H/2-115,'GAME OVER',{fontSize:'36px',fontFamily:'monospace',color:'#ff4444',stroke:'#000000',strokeThickness:4}).setOrigin(0.5);
    this.add.text(W/2, H/2-52, `Score: ${score}m`,{fontSize:'26px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
    this.add.text(W/2, H/2,    `Best: ${best}m`,  {fontSize:'20px',fontFamily:'monospace',color:'#8bc34a',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);

    const tapTxt = this.add.text(W/2, H/2+72,'TAP TO RETRY',{fontSize:'20px',fontFamily:'monospace',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
    this.tweens.add({ targets: tapTxt, alpha: 0, duration: 500, yoyo: true, repeat: -1 });

    const burst = this.add.particles(W/2, H/2-130, 'pstar', {
      speed:{min:50,max:160}, angle:{min:0,max:360},
      scale:{start:1,end:0}, alpha:{start:1,end:0}, lifespan:800,
      tint:[0x4a8c3f,0x8bc34a,0xd4e8a0], quantity:1, emitting:false,
    });
    burst.explode(24);

    this.time.delayedCall(400, () => {
      this.input.on('pointerdown', () => this.scene.start('Game'));
      this.input.keyboard && this.input.keyboard.on('keydown-SPACE', () => this.scene.start('Game'));
    });
    this.events.once('shutdown', () => burst.destroy());
  }
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#060d06',
  physics: { default: 'arcade', arcade: { gravity: { y: 800 }, debug: false } },
  scene: [BootScene, GameScene, GameOverScene],
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  parent: document.body,
  render: { antialias: true },
});
</script>
</body>
</html>
